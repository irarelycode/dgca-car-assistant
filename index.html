<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DGCA CAR Assistant – Live</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">✈️</div>
      <div>
        <h1>DGCA CAR Assistant</h1>
        <p>Live from Google Sheets • Directorate General of Civil Aviation</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="themeToggle" title="Toggle theme">🌙</button>
      <a id="status" class="status" target="_blank">Connecting...</a>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="kb">Knowledge Base</button>
    <button class="tab" data-tab="chat">Chat Assistant</button>
  </nav>

  <main>
    <section id="kb" class="panel active">
      <div class="controls">
        <input id="search" placeholder="Search description, file, section..." />
        <select id="directorate"><option value="">All Directorates</option></select>
        <select id="section"><option value="">All Sections</option></select>
        <select id="type"><option value="">All Types</option></select>
        <button id="refresh">↻ Refresh</button>
      </div>
      <div class="meta" id="meta"></div>
      <div class="table-wrap">
        <table id="tbl">
          <thead><tr>
            <th>Document</th><th>Type</th><th>Section</th><th>Date</th><th>Description</th><th>Directorate</th><th>Link</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="chat" class="panel">
      <div class="chat-wrap">
        <aside class="suggestions">
          <h3>Try asking</h3>
          <div id="suggest"></div>
          <div class="api-note">Powered by Groq + your sheet</div>
        </aside>
        <div class="chat">
          <div id="messages"></div>
          <div class="input-row">
            <input id="chatInput" placeholder="Ask about CAR 21, registration, CAR-M..." />
            <button id="send">Send</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>Prototype • Built for DGCA_Chatbot_Mapping_Sheet • Updates reflect in real-time</footer>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
